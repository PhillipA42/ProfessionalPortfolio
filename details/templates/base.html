{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Phillip Opiyo | Full-Stack Developer{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
<style>
    html { scroll-behavior: smooth; }
    
    body { 
        background-color: #011627; 
        color: #17BEBB; 
        font-family: 'Inter', sans-serif; 
        padding-top: 80px; /* Space for fixed navbar */
        padding-bottom: 70px; /* Space for fixed footer */
    }

    /* Navbar styling */
    .navbar { 
        background-color: #011627 !important; 
        border-bottom: 1px solid #17BEBB; 
    }
    .navbar-brand, .nav-link { color: #17BEBB !important; font-weight: 500; }
    .nav-link:hover { color: #ffffff !important; }

    /* Fix for the Contact Button in Navbar */
    .nav-contact-btn {
        border: 1px solid #17BEBB !important;
        border-radius: 20px;
        transition: all 0.3s ease;
    }
    .nav-contact-btn:hover {
        background-color: #17BEBB !important;
        color: #011627 !important;
    }

    /* Section Headings */
    h1, h2, h3, h4, h5, .fw-bold { color: #17BEBB; }
    
    /* Cards and Containers */
    .card { 
        background-color: #0b2135; 
        border: 1px solid #17BEBB; 
        color: #17BEBB; 
    }
    
    /* Footer Styling - Fixed to bottom */
    .fixed-footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: #011627;
        border-top: 1px solid #17BEBB;
        padding: 15px 0;
        z-index: 1030;
    }

    /* Form Inputs */
    .form-control { 
        background-color: #011627; 
        border: 1px solid #17BEBB; 
        color: #ffffff; 
    }
    .form-control:focus { 
        background-color: #0b2135; 
        border-color: #ffffff; 
        color: #ffffff; 
        box-shadow: 0 0 5px #17BEBB; 
    }
    
    label { color: #17BEBB; }
</style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#home">PHILLIP.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: #17BEBB;">
                <span class="navbar-toggler-icon" style="filter: invert(61%) sepia(85%) saturate(357%) hue-rotate(130deg) brightness(91%) contrast(89%);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="#testimonials">Testimonials</a></li>
                    <li class="nav-item">
                        <a class="nav-link nav-contact-btn ms-lg-3 px-3" href="#contact">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="fixed-footer text-center">
        <div class="container">
            <p class="mb-0" style="font-size: 0.9rem;">
                &copy; 2026 Phillip Opiyo | Full-Stack Developer | Built with Django & Bootstrap
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
